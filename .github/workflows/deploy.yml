name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE:     ${{ secrets.DOCKERHUB_USERNAME }}/react-demo
  BACKEND_IMAGE:    ${{ secrets.DOCKERHUB_USERNAME }}/demo-backend
  ANALYTICS_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/nexus-analytics
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  STACK_NAME:       react-demo-stack

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build & push Docker image to Docker Hub ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Configure AWS credentials ─────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 4. Deploy / update CloudFormation stack ──────────
      # Passes all three image names so UserData on new ASG instances
      # can pull every service on first boot without extra pipelines.
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/infrastructure.yml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DockerImage=${{ env.DOCKER_IMAGE }}:latest \
              BackendDockerImage=${{ env.BACKEND_IMAGE }}:latest \
              AnalyticsDockerImage=${{ env.ANALYTICS_IMAGE }}:latest \
              InstanceType=t2.micro \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # ── 5. Get ASG name from stack outputs ───────────────
      - name: Get ASG name
        id: get-asg
        run: |
          ASG_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`AutoScalingGroupName`].OutputValue' \
            --output text)
          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT
          echo "ASG: $ASG_NAME"

      # ── 6. Wait for an InService instance to have SSM online ──
      - name: Wait for SSM agent
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg_name }}"
          echo "Waiting for InService instances in $ASG_NAME..."

          for i in $(seq 1 40); do
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ASG_NAME" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text | awk '{print $1}')

            if [ -n "$INSTANCE_ID" ]; then
              STATUS=$(aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || echo "None")
              echo "Attempt $i — Instance $INSTANCE_ID SSM: $STATUS"
              if [ "$STATUS" = "Online" ]; then
                echo "SSM agent is online"
                break
              fi
            else
              echo "Attempt $i — No InService instances yet"
            fi

            [ "$i" = "40" ] && { echo "Timed out waiting for SSM"; exit 1; }
            sleep 15
          done

      # ── 7. Pull latest image and restart frontend on all instances ──
      - name: Update frontend container on all ASG instances
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg_name }}"
          IMAGE="${{ env.DOCKER_IMAGE }}:latest"

          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy react-demo ${{ github.sha }}" \
            --parameters "commands=[
              \"until docker info > /dev/null 2>&1; do sleep 5; done\",
              \"docker pull $IMAGE\",
              \"docker stop react-demo || true\",
              \"docker rm   react-demo || true\",
              \"docker run -d --name react-demo -p 8080:80 --restart unless-stopped $IMAGE\",
              \"echo Frontend updated\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $CMD_ID"

          for i in $(seq 1 36); do
            STATUSES=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --query 'CommandInvocations[*].Status' \
              --output text 2>/dev/null || echo "")

            echo "  Attempt $i — ${STATUSES:-Pending}"

            if echo "$STATUSES" | grep -E "Failed|TimedOut|Cancelled" > /dev/null 2>&1; then
              echo "Command failed on one or more instances"
              exit 1
            fi

            if [ -n "$STATUSES" ] && ! echo "$STATUSES" | grep -E "Pending|InProgress|Waiting|Delayed" > /dev/null 2>&1; then
              echo "All instances updated successfully"
              break
            fi

            [ "$i" = "36" ] && { echo "Timed out"; exit 1; }
            sleep 10
          done

      # ── 8. Print live URL ─────────────────────────────────
      - name: Print website URL
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text)
          echo "Deployment complete — $URL"

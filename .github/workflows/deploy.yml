name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/react-demo
  AWS_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: react-demo-stack

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build & push Docker image to Docker Hub ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Configure AWS credentials ─────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 4. Deploy / update CloudFormation stack ──────────
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/infrastructure.yml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DockerImage=${{ env.DOCKER_IMAGE }}:latest \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # ── 5. Get EC2 instance ID from stack outputs ─────────
      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "EC2 Instance ID: $INSTANCE_ID"

      # ── 6. Wait for SSM agent to come online ─────────────
      - name: Wait for SSM agent
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          echo "Waiting for SSM agent on $INSTANCE_ID..."

          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            echo "Attempt $i — SSM status: $STATUS"

            if [ "$STATUS" = "Online" ]; then
              echo "✅ SSM agent is online"
              break
            fi

            if [ "$i" = "20" ]; then
              echo "❌ SSM agent did not come online in time"
              exit 1
            fi

            sleep 15
          done

      # ── 7. Pull new image and restart container via SSM ──
      - name: Update container on EC2
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          IMAGE="${{ env.DOCKER_IMAGE }}:latest"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"echo 'Waiting for Docker to be ready...' \",
              \"until docker info > /dev/null 2>&1; do sleep 5; done\",
              \"echo 'Docker is ready'\",
              \"docker pull $IMAGE\",
              \"docker stop react-demo || true\",
              \"docker rm react-demo || true\",
              \"docker run -d --name react-demo -p 80:80 --restart unless-stopped $IMAGE\",
              \"echo Container started successfully\"
            ]" \
            --comment "Deploy ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until the command completes
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i — Command status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Container updated successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ SSM command failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            sleep 5
          done

      # ── 8. Print live URL ─────────────────────────────────
      - name: Print website URL
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text)
          echo ""
          echo "🚀 Deployment complete!"
          echo "🌐 Website live at: $URL"
          echo ""

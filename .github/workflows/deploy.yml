name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/react-demo
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  STACK_NAME:   react-demo-stack
  DOMAIN:         react-demo.bserc.org
  BACKEND_DOMAIN: api.react-demo.bserc.org

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build & push Docker image to Docker Hub ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Configure AWS credentials ─────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 4. Deploy / update CloudFormation stack ──────────
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/infrastructure.yml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DockerImage=${{ env.DOCKER_IMAGE }}:latest \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # ── 5. Get EC2 instance ID from stack outputs ─────────
      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "EC2 Instance ID: $INSTANCE_ID"

      # ── 6. Wait for SSM agent to come online ─────────────
      - name: Wait for SSM agent
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          echo "Waiting for SSM agent on $INSTANCE_ID..."

          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            echo "Attempt $i — SSM status: $STATUS"

            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi

            if [ "$i" = "20" ]; then
              echo "SSM agent did not come online in time"
              exit 1
            fi

            sleep 15
          done

      # ── 7. Ensure full setup is done, then update container ──
      - name: Setup and update container on EC2
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          IMAGE="${{ env.DOCKER_IMAGE }}:latest"
          CERT_PATH="/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem"
          BACKEND_CERT_PATH="/etc/letsencrypt/live/${{ env.BACKEND_DOMAIN }}/fullchain.pem"

          # Poll an SSM command until it finishes or fails.
          # Usage: poll_ssm <command-id> <max-attempts> <sleep-seconds>
          poll_ssm() {
            local CMD_ID="$1" MAX="$2" SLEEP="$3"
            for i in $(seq 1 "$MAX"); do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'Status' \
                --output text 2>/dev/null || echo "Pending")

              echo "  Attempt $i — $STATUS"

              if [ "$STATUS" = "Success" ]; then return 0; fi

              if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' --output text
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' --output text
                return 1
              fi

              [ "$i" = "$MAX" ] && return 1
              sleep "$SLEEP"
            done
          }

          # ── 7a. Run initial setup if SSL cert is missing ──
          # Amazon Linux 2 AMIs carry a stale cloud-init semaphore that causes
          # UserData to be skipped on new instances. We detect incomplete setup
          # by checking for the SSL cert and force-run the saved UserData script
          # (part-001) via SSM if needed, bypassing cloud-init entirely.
          echo "Checking whether initial setup is complete..."
          SETUP_CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 900 \
            --parameters "commands=[
              \"if [ -f $CERT_PATH ] && [ -f $BACKEND_CERT_PATH ]; then echo SETUP_DONE; exit 0; fi; echo SETUP_NEEDED; IID=\$(curl -s http://169.254.169.254/latest/meta-data/instance-id); rm -f /var/lib/cloud/instances/\$IID/sem/config-scripts-user; bash /var/lib/cloud/instance/scripts/part-001\"
            ]" \
            --comment "Setup check ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "Setup command ID: $SETUP_CMD"
          poll_ssm "$SETUP_CMD" 60 15 || { echo "Setup failed"; exit 1; }
          echo "Setup complete"

          # ── 7b. Pull latest image and restart container ────
          echo "Updating Docker container..."
          UPDATE_CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"until docker info > /dev/null 2>&1; do sleep 5; done\",
              \"docker pull $IMAGE\",
              \"docker stop react-demo || true\",
              \"docker rm   react-demo || true\",
              \"docker run -d --name react-demo -p 8080:80 --restart unless-stopped $IMAGE\",
              \"nginx -t && systemctl reload nginx\",
              \"echo Container updated\"
            ]" \
            --comment "Deploy ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "Update command ID: $UPDATE_CMD"
          poll_ssm "$UPDATE_CMD" 24 5 || { echo "Container update failed"; exit 1; }
          echo "Container updated"

      # ── 8. Print live URL ─────────────────────────────────
      - name: Print website URL
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text)
          echo "Deployment complete — $URL"

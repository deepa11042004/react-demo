AWSTemplateFormatVersion: '2010-09-09'
Description: >
  React Demo — Full infrastructure stack with Auto Scaling and ALB.
  Creates VPC, two public subnets, ACM SSL certificate, Application Load
  Balancer with host-based routing, Launch Template, Auto Scaling Group
  (min 1 / max 3, CPU target-tracking), IAM role for SSM, and Route53
  Alias records pointing to the ALB.

# ─────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────
Parameters:

  DockerImage:
    Type: String
    Description: "Frontend Docker Hub image (passed by GitHub Actions)"

  BackendDockerImage:
    Type: String
    Description: "Backend API Docker Hub image (passed by GitHub Actions)"

  AnalyticsDockerImage:
    Type: String
    Description: "Analytics service Docker Hub image (passed by GitHub Actions)"

  DomainName:
    Type: String
    Default: react-demo.bserc.org
    Description: "Frontend subdomain"

  BackendDomainName:
    Type: String
    Default: api.react-demo.bserc.org
    Description: "Backend API subdomain"

  AnalyticsDomainName:
    Type: String
    Default: analytics.react-demo.bserc.org
    Description: "Analytics service subdomain"

  HostedZoneId:
    Type: String
    Default: Z01291282OIN72SISEYSR
    Description: "Route53 Hosted Zone ID for the parent domain"

  InstanceType:
    Type: String
    Default: t2.small
    Description: "EC2 instance type"

  MinCapacity:
    Type: Number
    Default: 1
    Description: "Minimum number of EC2 instances in the ASG"

  MaxCapacity:
    Type: Number
    Default: 3
    Description: "Maximum number of EC2 instances in the ASG"

  KeyPairName:
    Type: String
    Default: ''
    Description: "EC2 Key Pair for SSH access (optional — SSM is preferred)"

# ─────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

# ─────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────
Resources:

  # ── Networking ──────────────────────────────
  # Two subnets in different AZs — required by the Application Load Balancer.

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: react-demo-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: react-demo-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: react-demo-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: react-demo-subnet-2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: react-demo-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # ── Security Groups ──────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and HTTPS inbound to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: react-demo-alb-sg

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 instances - accept container traffic from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (optional, SSM is preferred)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Frontend from ALB
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Backend API from ALB
        - IpProtocol: tcp
          FromPort: 3002
          ToPort: 3002
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Analytics from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: react-demo-ec2-sg

  # ── ACM Certificate ──────────────────────────
  # Single certificate covering all three subdomains.
  # CloudFormation automatically creates the Route53 DNS validation records
  # and waits for the certificate to be issued before continuing.

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Ref BackendDomainName
        - !Ref AnalyticsDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Ref BackendDomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Ref AnalyticsDomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: react-demo-cert

  # ── IAM Role ─────────────────────────────────
  # Grants SSM core access — enables GitHub Actions to run remote commands
  # on EC2 instances without requiring SSH access or key pairs.

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: react-demo-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: react-demo-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── Target Groups ────────────────────────────
  # One per service. The ALB forwards to each based on the Host header.
  # Health checks hit each container's port directly on the EC2 instance.

  TargetGroupFrontend:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 8080
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Tags:
        - Key: Name
          Value: react-demo-tg-frontend

  TargetGroupApi:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 3001
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Tags:
        - Key: Name
          Value: react-demo-tg-api

  TargetGroupAnalytics:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 3002
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Tags:
        - Key: Name
          Value: react-demo-tg-analytics

  # ── Application Load Balancer ────────────────

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: AttachGateway
    Properties:
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: react-demo-alb

  # HTTP → HTTPS redirect
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # HTTPS listener — default forwards to frontend
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupFrontend

  # Host-based routing rules
  APIListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 1
      Conditions:
        - Field: host-header
          Values:
            - !Ref BackendDomainName
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupApi

  AnalyticsListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 2
      Conditions:
        - Field: host-header
          Values:
            - !Ref AnalyticsDomainName
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupAnalytics

  # ── Launch Template ──────────────────────────
  # UserData is simplified — no nginx or certbot needed.
  # The ALB terminates SSL and routes by Host header directly to container ports.

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: react-demo-lt
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
        InstanceType: !Ref InstanceType
        Monitoring:
          Enabled: true
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
        SecurityGroupIds:
          - !Ref SecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: react-demo-server
              - Key: Project
                Value: react-demo
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -ex

            echo "=== START: $(date) ==="

            # ── Update system ──────────────────────────────
            yum update -y

            # ── Install Docker ─────────────────────────────
            amazon-linux-extras install docker -y
            systemctl start docker
            systemctl enable docker
            usermod -aG docker ec2-user

            # ── Frontend container ─────────────────────────
            echo ">>> start frontend"
            docker pull ${DockerImage}
            docker stop react-demo || true
            docker rm   react-demo || true
            docker run -d \
              --name react-demo \
              -p 8080:80 \
              --restart unless-stopped \
              ${DockerImage}

            # ── Backend API container ──────────────────────
            echo ">>> start backend api"
            if docker pull ${BackendDockerImage}; then
              docker stop nexus-api || true
              docker rm   nexus-api || true
              docker run -d \
                --name nexus-api \
                -p 3001:3001 \
                --restart unless-stopped \
                ${BackendDockerImage}
            fi

            # ── Analytics container ────────────────────────
            echo ">>> start analytics"
            if docker pull ${AnalyticsDockerImage}; then
              docker stop nexus-analytics || true
              docker rm   nexus-analytics || true
              docker run -d \
                --name nexus-analytics \
                -p 3002:3002 \
                --restart unless-stopped \
                ${AnalyticsDockerImage}
            fi

            echo "=== DONE: $(date) ==="

  # ── Auto Scaling Group ───────────────────────

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: AttachGateway
    Properties:
      AutoScalingGroupName: react-demo-asg
      VPCZoneIdentifier:
        - !Ref PublicSubnet
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: !Ref MinCapacity
      MaxSize: !Ref MaxCapacity
      DesiredCapacity: !Ref MinCapacity
      TargetGroupARNs:
        - !Ref TargetGroupFrontend
        - !Ref TargetGroupApi
        - !Ref TargetGroupAnalytics
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: react-demo-server
          PropagateAtLaunch: true
        - Key: Project
          Value: react-demo
          PropagateAtLaunch: true

  # ── Auto Scaling Policy ──────────────────────
  # Target tracking at 70% avg CPU — AWS automatically adds/removes instances.

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70

  # ── Route53 Alias Records → ALB ──────────────
  # All three subdomains point to the same ALB.
  # The ALB uses the Host header to route to the correct target group.

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

  DNSRecordBackend:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref BackendDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

  DNSRecordAnalytics:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref AnalyticsDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────
Outputs:

  WebsiteURL:
    Description: Public HTTPS URL of the website
    Value: !Sub 'https://${DomainName}'

  ALBDNSName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  AutoScalingGroupName:
    Description: ASG name — used by backend/analytics pipelines for SSM targeting
    Value: !Ref AutoScalingGroup
    Export:
      Name: ReactDemoASGName

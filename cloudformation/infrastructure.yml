AWSTemplateFormatVersion: '2010-09-09'
Description: >
  React Demo — Full infrastructure stack.
  Creates VPC, public subnet, EC2 (Docker + nginx + Let's Encrypt SSL),
  Elastic IP, IAM role for SSM and Route53, and a DNS A record.

# ─────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────
Parameters:

  DockerImage:
    Type: String
    Description: "Docker Hub image to deploy (passed by GitHub Actions CI/CD)"

  DomainName:
    Type: String
    Default: react-demo.bserc.org
    Description: "Subdomain for the website (must belong to the HostedZoneId zone)"

  HostedZoneId:
    Type: String
    Default: Z01291282OIN72SISEYSR
    Description: "Route53 Hosted Zone ID for the parent domain"

  CertbotEmail:
    Type: String
    Default: peltowninfra@gmail.com
    Description: "Email address for Let's Encrypt certificate expiry notifications"

  InstanceType:
    Type: String
    Default: t2.small
    Description: "EC2 instance type"

  BackendDomainName:
    Type: String
    Default: api.react-demo.bserc.org
    Description: "Subdomain for the backend API"

  AnalyticsDomainName:
    Type: String
    Default: analytics.react-demo.bserc.org
    Description: "Subdomain for the analytics service"

  KeyPairName:
    Type: String
    Default: ''
    Description: "EC2 Key Pair for SSH access (optional — SSM is preferred for deployments)"

# ─────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

# ─────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────
Resources:

  # ── Networking ──────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: react-demo-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: react-demo-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: react-demo-public-subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: react-demo-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ── Security Group ───────────────────────────

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS and SSH inbound traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (optional, SSM is preferred)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: react-demo-sg

  # ── IAM Role ─────────────────────────────────
  # Grants the EC2 instance:
  #   • SSM core access  — so GitHub Actions can run remote commands without SSH
  #   • Route53 access   — so Certbot can complete the DNS-01 challenge for SSL

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: react-demo-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CertbotRoute53Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:GetChange
                  - route53:ChangeResourceRecordSets
                Resource: '*'
      Tags:
        - Key: Name
          Value: react-demo-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── EC2 Instance ─────────────────────────────

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          echo "=== START: $(date) ==="

          # ── Update system ──────────────────────────────
          echo ">>> yum update"
          yum update -y

          # ── Install Docker ─────────────────────────────
          echo ">>> install docker"
          amazon-linux-extras install docker -y
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # ── Pull and start the application container ───
          echo ">>> docker pull and run"
          docker pull ${DockerImage}
          docker stop react-demo || true
          docker rm   react-demo || true
          docker run -d \
            --name react-demo \
            -p 8080:80 \
            --restart unless-stopped \
            ${DockerImage}

          # ── Install nginx ──────────────────────────────
          echo ">>> install nginx"
          amazon-linux-extras install nginx1 -y
          systemctl enable nginx

          # ── Install Certbot ────────────────────────────
          # urllib3 pinned to <1.27: Python 3.7 on Amazon Linux 2 uses
          # OpenSSL 1.0.2k which is incompatible with urllib3 v2.x
          echo ">>> install certbot"
          amazon-linux-extras install epel -y
          yum install -y python3
          python3 -m pip install certbot certbot-dns-route53 "urllib3>=1.25.4,<1.27"

          # ── Obtain SSL certificates via Route53 DNS-01 challenge ──
          echo ">>> run certbot (frontend)"
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email ${CertbotEmail} \
            -d ${DomainName} \
            --dns-route53-propagation-seconds 60

          echo ">>> run certbot (backend)"
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email ${CertbotEmail} \
            -d ${BackendDomainName} \
            --dns-route53-propagation-seconds 60

          echo ">>> run certbot (analytics)"
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email ${CertbotEmail} \
            -d ${AnalyticsDomainName} \
            --dns-route53-propagation-seconds 60

          # ── Configure nginx as SSL reverse proxy ───────
          echo ">>> configure nginx"
          cat > /etc/nginx/conf.d/react-demo.conf << 'NGINXEOF'
          server {
              listen 80;
              server_name ${DomainName} ${BackendDomainName} ${AnalyticsDomainName};
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name ${DomainName};
              ssl_certificate /etc/letsencrypt/live/${DomainName}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${DomainName}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;
              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          server {
              listen 443 ssl;
              server_name ${BackendDomainName};
              ssl_certificate /etc/letsencrypt/live/${BackendDomainName}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${BackendDomainName}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;
              location / {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          server {
              listen 443 ssl;
              server_name ${AnalyticsDomainName};
              ssl_certificate /etc/letsencrypt/live/${AnalyticsDomainName}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${AnalyticsDomainName}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;
              location / {
                  proxy_pass http://127.0.0.1:3002;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINXEOF

          nginx -t
          systemctl restart nginx

          # ── Schedule daily certificate renewal ─────────
          echo "0 3 * * * root certbot renew --quiet && systemctl reload nginx" >> /etc/crontab

          echo "=== DONE: $(date) ==="
      Tags:
        - Key: Name
          Value: react-demo-server

  # ── Elastic IP ───────────────────────────────

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
      Tags:
        - Key: Name
          Value: react-demo-eip

  # ── Route53 A Records ────────────────────────

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: '60'
      ResourceRecords:
        - !Ref ElasticIP

  DNSRecordBackend:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref BackendDomainName
      Type: A
      TTL: '60'
      ResourceRecords:
        - !Ref ElasticIP

  DNSRecordAnalytics:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref AnalyticsDomainName
      Type: A
      TTL: '60'
      ResourceRecords:
        - !Ref ElasticIP

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────
Outputs:

  WebsiteURL:
    Description: Public HTTPS URL of the website
    Value: !Sub 'https://${DomainName}'

  PublicIP:
    Description: Elastic IP address
    Value: !Ref ElasticIP

  InstanceId:
    Description: EC2 Instance ID (used by GitHub Actions for SSM commands)
    Value: !Ref EC2Instance
    Export:
      Name: ReactDemoInstanceId

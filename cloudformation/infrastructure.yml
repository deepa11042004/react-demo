AWSTemplateFormatVersion: '2010-09-09'
Description: >
  React Demo — Full infrastructure stack.
  Creates VPC, public subnet, EC2 instance with Docker, Elastic IP, and IAM role for SSM.

# ─────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────
Parameters:

  DockerImage:
    Type: String
    Description: "Docker Hub image to run on first boot (e.g. yourname/react-demo:latest)"

  KeyPairName:
    Type: String
    Default: ''
    Description: "EC2 Key Pair name for SSH access (leave empty to skip — SSM is used for deployments)"

# ─────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

# ─────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────
Resources:

  # ── Networking ──────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: react-demo-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: react-demo-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: react-demo-public-subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: react-demo-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ── Security Group ───────────────────────────

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH inbound traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (optional, SSM is preferred)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: react-demo-sg

  # ── IAM Role (SSM access only — no ECR needed) ──

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: react-demo-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: react-demo-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── EC2 Instance ─────────────────────────────

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      # Latest Amazon Linux 2 AMI — resolved automatically per region
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t2.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Update system
          yum update -y

          # Install Docker
          amazon-linux-extras install docker -y
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Pull image from Docker Hub and run
          docker pull ${DockerImage}

          docker run -d \
            --name react-demo \
            -p 80:80 \
            --restart unless-stopped \
            ${DockerImage}

          echo "✅ react-demo container started"
      Tags:
        - Key: Name
          Value: react-demo-server

  # ── Elastic IP ───────────────────────────────

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
      Tags:
        - Key: Name
          Value: react-demo-eip

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────
Outputs:

  WebsiteURL:
    Description: Public URL of the website
    Value: !Sub 'http://${ElasticIP}'

  PublicIP:
    Description: Elastic IP address
    Value: !Ref ElasticIP

  InstanceId:
    Description: EC2 Instance ID (used by GitHub Actions SSM commands)
    Value: !Ref EC2Instance
    Export:
      Name: ReactDemoInstanceId
